<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Investment Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Stock Investment Calculator</h1>
        
        <!-- Ticker Symbol Management Section -->
        <div class="ticker-management">
            <h2>Manage Ticker Symbols</h2>
            <form id="tickerForm">
                <input type="text" id="newTickerSymbol" placeholder="Enter new ticker symbol (e.g., BTC)" required>
                <button type="submit" id="addTickerButton">Add Ticker Symbol</button>
            </form>
            <ul id="tickerList">
                <!-- Existing ticker symbols will be listed here -->
            </ul>
        </div>
        
        <!-- Calculator Section -->
        
        <div class="calculator-section">
            <h2>Investment Entries</h2>
            <form id="investmentForm">
                <div id="investmentEntries">
                    <div class="investment-entry">
                        <label>Buy Price per Share ($):</label>
                        <input type="number" name="buyPrice" placeholder="Enter buy price per share" step="0.0001" required data-buy-price>
                        
                        <label>Total Shares:</label>
                        <input type="number" name="totalShares" placeholder="Enter total shares" min="0" step="0.01" data-total-shares>
                        
                        <label>Investment Amount ($):</label>
                        <input type="number" name="investmentAmount" placeholder="Enter investment amount" min="0" step="0.01" data-investment-amount>
                        
                        <label>Ticker Symbol:</label>
                        <select name="tickerSymbol" class="tickerSelect" required>
                            <option value="DOGE">DOGE</option>
                            <!-- Other ticker options will be populated dynamically -->
                        </select>
                        
                        <label>Sell Price per Share ($):</label>
                        <input type="number" name="sellPrice" placeholder="Enter sell price per share (optional)" step="0.0001" min="0" data-sell-price>
                        
                        <button type="button" class="remove-entry">Remove</button>
                    </div>
                    <!-- Add more default entries as needed -->
                </div>
                <button type="button" id="addEntry">Add Investment</button>
            </form>
            
            <div class="button-container">
                <button id="calculateButton">Calculate</button>
                <!-- Clear button will be added by JavaScript -->
            </div>
            
            <!-- Loading Indicator with Spinner -->
            <div id="loading" style="display:none;">
                <div class="spinner"></div>
                <span>Calculating...</span>
            </div>
        </div>

        
        <!-- Results Section -->
        <div class="results">
            <h2>Results</h2>
            <p id="totalShares"></p>
            <p id="totalInvestment"></p>
            <p id="totalBuyPrice"></p>
            <p id="totalSellPrice"></p>
            <p id="totalProfitLoss"></p>
            <p id="averagePrice"></p>
            <p id="averageSellPrice"></p> <!-- New Paragraph for Average Sell Price -->
        </div>
    </div>
    
    <!-- Footer Section -->
    <footer>
        <p>&copy; <a href="https://www.TrionxAI.com" target="_blank">TrionxAI</a></p>
    </footer>
</body>
</html>
